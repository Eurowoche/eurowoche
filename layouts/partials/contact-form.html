{{ $lang := .Lang }}
<form class="contact-form" action="/contact.php" method="POST" id="contact-form" novalidate>
    <input type="hidden" name="lang" value="{{ $lang }}">

    <div class="form-row">
        <div class="form-group">
            <label for="first-name">{{ i18n "first_name" }} *</label>
            <input type="text" id="first-name" name="first-name" required autocomplete="given-name">
        </div>
        <div class="form-group">
            <label for="last-name">{{ i18n "last_name" }}</label>
            <input type="text" id="last-name" name="last-name" autocomplete="family-name">
        </div>
    </div>

    <div class="form-group">
        <label for="email">{{ i18n "email" }} *</label>
        <input type="email" id="email" name="email" required autocomplete="email">
    </div>

    <div class="form-group">
        <label for="betreff">Betreff *</label>
        <input type="text" id="betreff" name="betreff" required>
    </div>

    <div class="form-group">
        <label for="message">{{ i18n "write_message" }} *</label>
        <textarea id="message" name="message" rows="5" required></textarea>
    </div>

    <div class="form-group form-dsgvo">
        <label class="dsgvo-label">
            <input type="checkbox" name="datenschutz" id="datenschutz" required>
            <span>Ich habe die <a href="/disclaimer/" target="_blank">Datenschutzerklärung</a> gelesen und bin damit einverstanden, dass meine Angaben zur Bearbeitung meiner Anfrage gespeichert und verwendet werden. *</span>
        </label>
    </div>

    <p class="form-required-hint">* Pflichtfelder</p>

    <button type="submit" class="btn btn-primary btn-full">{{ i18n "submit" }}</button>
</form>
