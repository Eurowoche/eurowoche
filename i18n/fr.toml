[verein_about_title]
other = "À propos de nous"

[verein_about_text]
other = "Notre association porte le nom d'Arbeitskreis Europäische Jugendwochen Burg Ludwigstein e.V. Elle est basée à Witzenhausen et enregistrée au registre des associations du tribunal d'instance d'Eschwege. L'association poursuit des objectifs exclusivement et directement caritatifs."

[verein_comm_title]
other = "Plus que de la danse et de la musique : une communication d'égal à égal"

[verein_comm_text]
other = "Chez nous, la culture prend vie. Nous croyons que chanter, faire de la musique et danser ensemble sont les meilleurs moyens de surmonter les barrières linguistiques et d'avoir de véritables échanges. Si les premières rencontres étaient avant tout marquées par la danse folklorique, la musique chorale et instrumentale est aujourd'hui aussi devenue un pilier de notre travail commun."

[verein_purpose_title]
other = "Objet de l'association"

[verein_purpose_intro]
other = "L'association poursuit des objectifs exclusivement caritatifs, réalisés notamment par :"

[verein_purpose_1]
other = "<strong>L'organisation et la mise en œuvre</strong> des Semaines européennes de la jeunesse à Burg Ludwigstein."

[verein_purpose_2]
other = "<strong>La promotion de l'idée européenne</strong> et des échanges interculturels entre jeunes de différents pays."

[verein_purpose_3]
other = "<strong>Le soutien des groupes participants</strong> dans leur travail culturel, créatif et social."

[verein_purpose_4]
other = "<strong>L'entretien de la coopération avec les organisations partenaires européennes</strong> et les anciens participants."

[verein_purpose_5]
other = "<strong>Le renforcement de la compréhension, de l'amitié et de la solidarité</strong> par-delà les frontières nationales, ethniques et religieuses."

[verein_dancers_title]
other = "Die Ludwigsteiner"

[verein_dancers_p1]
other = "Die Ludwigsteiner est le groupe de danse propre à l'association Arbeitskreis Europäische Jugendwochen."

[verein_dancers_p2]
other = "Les danseurs et danseuses viennent de toute l'Allemagne. C'est pourquoi ils ne se réunissent que quelques fois par an, mais répètent alors très intensément et avec une grande passion."

[verein_dancers_p3]
other = "Le groupe représente diverses traditions allemandes qu'il met en scène à travers des histoires dansées. Il utilise d'anciennes danses folkloriques et différents costumes traditionnels, intégrés dans de nouvelles chorégraphies. Le groupe est toujours accompagné en direct par le groupe de musique Les Ludwigsteiner Musiker."

[verein_dancers_p4]
other = "Le groupe présente ces histoires chaque année lors de la Semaine européenne de la jeunesse, ainsi qu'à l'occasion de diverses représentations en Allemagne et à l'étranger."

[verein_dancers_facts_label]
other = "Chiffres clés :"

[verein_dancers_facts]
other = "Fondé en 1990 par Fritz Lenz<br>Depuis 1991 représentant permanent de l'Allemagne à la Semaine européenne de la jeunesse<br>Représentations internationales dans plus de 10 pays<br>Direction actuelle : Annika Meyer &amp; Johanna Klauer"

[verein_musicians_title]
other = "Die Ludwigsteiner Musiker"

[verein_musicians_p1]
other = "Les Ludwigsteiner Musiker sont le groupe de musique propre à l'association. L'équipe de 7 membres représente l'Allemagne à la Semaine européenne de la jeunesse aux côtés du groupe de danse Ludwigsteiner."

[verein_musicians_p2]
other = "Le groupe est composé de membres venant de différentes régions d'Allemagne, d'Autriche, du Danemark, de Pologne et de Lettonie. Outre divers morceaux folkloriques allemands traditionnels, le groupe joue également des pièces plus contemporaines et des compositions originales."

[verein_musicians_p3]
other = "Direction actuelle : Maciej Derra.<br>Instruments : flûte traversière, accordéon, basse, guitare, bugle ténor (ou baryton), chant."

[verein_cioff_title]
other = "Membre du CIOFF®"

[verein_cioff_p1]
other = "L'Arbeitskreis Europäische Jugendwochen Burg Ludwigstein e.V. est membre du CIOFF® (Conseil International des Organisations de Festivals de Folklore et d'Arts Traditionnels), une organisation partenaire internationale de l'UNESCO dans le domaine de la culture traditionnelle et du folklore."

[verein_cioff_p2]
other = "Notre adhésion souligne notre ambition internationale et notre engagement en faveur des échanges culturels et de la compréhension mutuelle entre les peuples."

[verein_cioff_link]
other = "En savoir plus sur le CIOFF®"

[maerkte_intro]
other = "Les membres de l'Arbeitskreis Europäische Jugendwochen organisent chaque année deux marchés artisanaux uniques avec beaucoup de passion. <strong>Les bénéfices financent la Semaine européenne de la jeunesse</strong> et créent des lieux de rencontre pour les visiteurs, les exposants et les bénévoles."

[ostermarkt_title]
other = "Marché de Pâques"

[ostermarkt_subtitle]
other = "Artisanat, traditions pascales et rencontres"

[ostermarkt_p1]
other = "Le Marché de Pâques est un marché artisanal et de producteurs, organisé bénévolement par les membres de l'Arbeitskreis Europäische Jugendwochen. L'objectif est d'utiliser les bénéfices pour financer la Semaine européenne de la jeunesse en été."

[ostermarkt_p2]
other = "Des exposants de différentes régions d'Allemagne présentent des traditions pascales et des produits faits main. L'artisanat autour des oeufs est particulièrement apprécié, avec des créations allant des oeufs d'autruche aux oeufs de perruche."

[ostermarkt_p3]
other = "Le Marché de Pâques se tient dans les salles accessibles aux personnes à mobilité réduite de l'ancien monastère et invite à une promenade détendue. Dans la cour, les stands, les décorations printanières ainsi que les arômes de bratwurst et de crêpes créent une atmosphère animée."

[ostermarkt_p4]
other = "La cafétéria propose du café et des gâteaux faits maison, tandis que l'atelier de bricolage de Pâques invite les visiteurs de tous âges à participer. Une tombola avec des prix artisanaux complète l'offre."

[ostermarkt_p5]
other = "De nombreux exposants et membres de l'association séjournent à Burg Ludwigstein. Le dîner commun du samedi soir est l'occasion de rencontres, de nouveaux contacts et d'amitiés durables."

[ostermarkt_details]
other = "Tous les détails sur le prochain Marché de Pâques :"

[adventsmarkt_title]
other = "Marché de Noël"

[adventsmarkt_subtitle]
other = "Lumière, musique et atmosphère hivernale"

[adventsmarkt_p1]
other = "Le deuxième dimanche de l'Avent, Burg Ludwigstein se transforme en un marché de Noël magnifiquement décoré. Dans les salles historiques, les exposants présentent leurs créations artisanales et partagent des techniques de fabrication traditionnelles."

[adventsmarkt_p2]
other = "Un temps fort particulier est l'exposition de Noël et de crèches avec des pièces du monde entier. La fanfare de l'association et d'autres groupes accompagnent musicalement le marché."

[adventsmarkt_p3]
other = "Dans la cour du château, une crèche vivante, du vin chaud, des crêpes et des bratwursts invitent à s'attarder. La cafétéria propose des gâteaux faits maison par les membres de l'association."

[adventsmarkt_p4]
other = "L'atelier de bricolage de Noël est ouvert les deux jours et invite les visiteurs de tous âges à créer. Sinterklaas, venu des Pays-Bas, visite le marché et apporte des cadeaux aux enfants."

[adventsmarkt_p5]
other = "Comme le Marché de Pâques, le Marché de Noël est entièrement organisé bénévolement et contribue de manière significative au financement de la Semaine européenne de la jeunesse."

