[verein_about_title]
other = "About us"

[verein_about_text]
other = "Our association bears the name Arbeitskreis Europäische Jugendwochen Burg Ludwigstein e.V. It is based in Witzenhausen and registered in the association register of the Eschwege district court. The association serves exclusively and directly charitable purposes."

[verein_comm_title]
other = "More than just dance and music: Communication at eye level"

[verein_comm_text]
other = "Culture comes alive with us. We believe that singing, making music and dancing together are the best ways to overcome language barriers and have genuine conversations. While the early meetings were primarily shaped by folk dance, choral and instrumental music have also become pillars of our shared work today."

[verein_purpose_title]
other = "Purpose of the Association"

[verein_purpose_intro]
other = "The association pursues exclusively charitable purposes, realized in particular through:"

[verein_purpose_1]
other = "<strong>Organisation and implementation</strong> of the European Youth Weeks at Burg Ludwigstein."

[verein_purpose_2]
other = "<strong>Promotion of the European idea</strong> and intercultural exchange among young people from different countries."

[verein_purpose_3]
other = "<strong>Support of participating groups</strong> in their cultural, creative and social work."

[verein_purpose_4]
other = "<strong>Nurturing cooperation with European partner organisations</strong> and former participants."

[verein_purpose_5]
other = "<strong>Strengthening understanding, friendship and solidarity</strong> across national, ethnic and religious borders."

[verein_dancers_title]
other = "Die Ludwigsteiner"

[verein_dancers_p1]
other = "Die Ludwigsteiner are the association's own dance group of the Arbeitskreis Europäische Jugendwochen."

[verein_dancers_p2]
other = "The dancers come together from all over Germany. For this reason, they only meet a few times a year, but then rehearse very intensively and with great passion."

[verein_dancers_p3]
other = "The group showcases various German traditions, which they dance into stories. They use old folk dances and various traditional costumes, working them into new choreographies. They are always accompanied live by the Ludwigsteiner Musiker."

[verein_dancers_p4]
other = "The group presents these stories each year at the European Youth Week, as well as at various performances inside and outside Germany."

[verein_dancers_facts_label]
other = "Key facts:"

[verein_dancers_facts]
other = "Founded 1990 by Fritz Lenz<br>Since 1991 the permanent German representation at the European Youth Week<br>International performances in over 10 countries worldwide<br>Current leadership: Annika Meyer &amp; Johanna Klauer"

[verein_musicians_title]
other = "Die Ludwigsteiner Musiker"

[verein_musicians_p1]
other = "The Ludwigsteiner Musiker are the association's own music group. The 7-member team, together with the Ludwigsteiner dance group, represents Germany at the European Youth Week."

[verein_musicians_p2]
other = "The group comes from various parts of Germany, Austria, Denmark, Poland and Latvia. In addition to traditional German pieces, the group also plays more contemporary music and original compositions."

[verein_musicians_p3]
other = "Current leadership: Maciej Derra.<br>Instruments: flute, accordion, bass, guitar, tenor horn (or baritone), vocals."

[verein_cioff_title]
other = "Member of CIOFF®"

[verein_cioff_p1]
other = "The Arbeitskreis Europäische Jugendwochen Burg Ludwigstein e.V. is a member of CIOFF® (Conseil International des Organisations de Festivals de Folklore et d'Arts Traditionnels), an international partner organisation of UNESCO in the field of traditional culture and folklore."

[verein_cioff_p2]
other = "Our membership underlines our international commitment and our dedication to cultural exchange and mutual understanding between peoples."

[verein_cioff_link]
other = "More about CIOFF®"

[maerkte_intro]
other = "The members of the Arbeitskreis Europäische Jugendwochen organise two special arts and crafts markets each year with great dedication. <strong>The proceeds secure the funding of the European Youth Week</strong> and create places of encounter for visitors, exhibitors and volunteers alike."

[ostermarkt_title]
other = "Easter Market"

[ostermarkt_subtitle]
other = "Arts &amp; crafts, spring traditions and community"

[ostermarkt_p1]
other = "The Easter Market is an arts, crafts and producers market organised entirely on a voluntary basis by members of the Arbeitskreis Europäische Jugendwochen. Its purpose is to use the proceeds to fund the European Youth Week in the summer."

[ostermarkt_p2]
other = "Exhibitors from various regions of Germany present Easter customs and handmade products. Particularly popular is the intricate egg craft, which produces small works of art ranging from ostrich to budgerigar eggs."

[ostermarkt_p3]
other = "The Easter Market takes place in the wheelchair-accessible rooms of the old monastery and invites visitors to browse at a leisurely pace. In the courtyard, market stalls, spring decorations and the aroma of bratwurst and crêpes create a lively atmosphere."

[ostermarkt_p4]
other = "The cafeteria offers coffee and home-baked cakes, while the Easter crafts room invites visitors of all ages to get creative. A tombola with handmade prizes rounds off the programme."

[ostermarkt_p5]
other = "Many exhibitors and association members stay overnight at Burg Ludwigstein. The shared dinner on Saturday brings people together, forging new contacts and lasting friendships."

[ostermarkt_details]
other = "All details on the upcoming Easter Market:"

[adventsmarkt_title]
other = "Christmas Market"

[adventsmarkt_subtitle]
other = "Light, music and a wintry atmosphere"

[adventsmarkt_p1]
other = "On the second Sunday of Advent, Burg Ludwigstein is transformed into a beautifully decorated Christmas market. In the historic rooms, exhibitors present their handcrafted works and offer insights into traditional production techniques."

[adventsmarkt_p2]
other = "A special highlight is the Christmas and nativity exhibition featuring exhibits from around the world. The association's ensemble and other groups provide musical accompaniment throughout the market."

[adventsmarkt_p3]
other = "In the castle courtyard, a living nativity scene, mulled wine, crêpes and bratwurst invite visitors to linger. The cafeteria offers home-baked cakes made by association members."

[adventsmarkt_p4]
other = "The Christmas crafts room is open on both days and invites visitors of all ages to get creative. Sinterklaas from the Netherlands visits the market and brings gifts for the children."

[adventsmarkt_p5]
other = "Like the Easter Market, the Christmas Market is organised entirely on a voluntary basis and makes a significant contribution to funding the European Youth Week."

[adventsmarkt_details]
other = "All details on the upcoming Christmas Market:"
