- jahr: "1953"
  titel: "Gründung der Europäischen Jugendwoche"
  titel_en: "Foundation of the European Youth Week"
  text: "Hella Heynmöller gründet die Europäische Jugendwoche als Antwort auf den Zweiten Weltkrieg – mit dem Ziel, durch Begegnung, Musik und Tanz gegenseitiges Verständnis zu fördern."
  text_en: "Hella Heynmöller founds the European Youth Week as a response to World War II – with the aim of fostering mutual understanding through encounters, music and dance."

- jahr: "1960er–1970er"
  titel: "Wachstum und künstlerische Entwicklung"
  titel_en: "Growth and artistic development"
  text: "Volkstanz, Gesang und Instrumentalmusik entwickeln sich zu den tragenden Säulen der Eurowoche. Immer mehr internationale Gruppen nehmen teil."
  text_en: "Folk dance, singing and instrumental music become the pillars of the Eurowoche. More and more international groups participate."

- jahr: "1981"
  titel: "Gründung des Arbeitskreises"
  titel_en: "Foundation of the Association"
  text: "Der Arbeitskreis Europäische Jugendwochen Burg Ludwigstein e.V. wird gegründet und übernimmt die Organisation der Eurowoche."
  text_en: "The Arbeitskreis Europäische Jugendwochen Burg Ludwigstein e.V. is founded and takes over the organization of the Eurowoche."

- jahr: "1990er Jahre"
  titel: "Internationalisierung & neue Generationen"
  titel_en: "Internationalization & new generations"
  text: "Neue internationale Begegnungen und die Gründung der Folkloregruppe Die Ludwigsteiner erweitern die Eurowoche und stärken ihren internationalen Charakter."
  text_en: "New international encounters and the founding of the folklore group Die Ludwigsteiner expand the Eurowoche and strengthen its international character."

- jahr: "Heute"
  titel: "Begegnung mit Tradition"
  titel_en: "Encounters with tradition"
  text: "Mehr als 300 Gruppen und rund 10.000 Teilnehmende sind Teil der Geschichte der Eurowoche. Bis heute steht sie für Austausch, Freundschaft und Völkerverständigung."
  text_en: "More than 300 groups and around 10,000 participants are part of the Eurowoche's history. To this day, it stands for exchange, friendship and international understanding."
