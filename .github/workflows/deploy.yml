name: Build & Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via SFTP to Strato
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_DIR: ${{ secrets.SFTP_DIR }}
        run: |
          sudo apt-get install -y lftp sshpass

          # Fix: Passwort an BEIDE Ebenen übergeben:
          # 1) -u user,pass → lftp kennt das Passwort → kein GetPass()-Fehler
          # 2) SSHPASS env  → sshpass leitet Passwort an den system-ssh weiter
          # sftp:connect-program → System-SSH statt lftp-eigener Client (behebt 502)
          SSHPASS="$SFTP_PASS" lftp \
            -u "$SFTP_USER","$SFTP_PASS" \
            sftp://$SFTP_HOST \
            -e "
              set sftp:connect-program 'sshpass -e ssh -a -x -oStrictHostKeyChecking=no -oPasswordAuthentication=yes';
              set net:max-retries 3;
              set net:timeout 60;
              mirror --reverse --delete public/ $SFTP_DIR/;
              bye
            "
