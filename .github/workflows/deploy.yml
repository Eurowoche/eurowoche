name: Build & Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via SFTP to Strato
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_DIR: ${{ secrets.SFTP_DIR }}
        run: |
          sudo apt-get install -y lftp sshpass

          # Passwort in URL einbetten → verhindert GetPass()-Fehler (kein Terminal in CI)
          # connect-program mit sshpass → System-SSH nutzt SSHPASS-env für Auth
          # Wichtig: Script-Datei VOR lftp-Start schreiben → set-Befehle gelten vor open
          printf '%s\n' \
            "set sftp:connect-program \"sshpass -e ssh -a -x -oStrictHostKeyChecking=no -oPasswordAuthentication=yes\"" \
            "set sftp:auto-confirm yes" \
            "set net:max-retries 2" \
            "set net:timeout 30" \
            "open sftp://${SFTP_USER}:${SFTP_PASS}@${SFTP_HOST}:22" \
            "mirror --reverse --delete public/ ${SFTP_DIR}/" \
            "bye" \
            > /tmp/lftp_deploy

          SSHPASS="$SFTP_PASS" lftp -f /tmp/lftp_deploy
          rm -f /tmp/lftp_deploy
