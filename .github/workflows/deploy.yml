name: Build & Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via SFTP to Strato
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_DIR: ${{ secrets.SFTP_DIR }}
        run: |
          pip install paramiko --quiet

          python3 << 'PYEOF'
          import paramiko, os, sys
          from pathlib import Path

          host     = os.environ['SFTP_HOST']
          user     = os.environ['SFTP_USER']
          password = os.environ['SFTP_PASS']
          remote   = os.environ['SFTP_DIR']
          local    = Path('public')

          print(f"Connecting to {host} as {user} ...")

          transport = paramiko.Transport((host, 22))
          transport.connect()
          transport.auth_password(user, password)
          sftp = paramiko.SFTPClient.from_transport(transport)

          def mkdir_p(sftp, path):
              """Erstellt Verzeichnis-Pfad rekursiv (ignoriert Fehler wenn schon vorhanden)."""
              parts = path.replace('\\', '/').split('/')
              current = ''
              for part in parts:
                  if not part:
                      continue
                  current = current + '/' + part if current else part
                  try:
                      sftp.mkdir(current)
                  except OSError:
                      pass  # existiert bereits

          # Alle lokalen Dateien hochladen
          uploaded = 0
          for item in sorted(local.rglob('*')):
              if item.is_file():
                  rel        = item.relative_to(local)
                  remote_path = (remote.rstrip('/') + '/' + str(rel).replace('\\', '/')).replace('//', '/')
                  remote_dir  = '/'.join(remote_path.split('/')[:-1])
                  mkdir_p(sftp, remote_dir)
                  sftp.put(str(item), remote_path)
                  uploaded += 1

          sftp.close()
          transport.close()
          print(f"Deploy abgeschlossen: {uploaded} Dateien hochgeladen.")
          PYEOF
