name: Upload Wiki Installer to Strato

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'wiki-installer/**'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install-dokuwiki.php to /wiki/
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
        run: |
          pip install paramiko --quiet
          python3 -c "
import paramiko, sys

client = paramiko.SSHClient()
client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
client.connect(
    hostname='${{ secrets.SFTP_HOST }}',
    port=22,
    username='${{ secrets.SFTP_USER }}',
    password='${{ secrets.SFTP_PASSWORD }}',
    look_for_keys=False, allow_agent=False
)
sftp = client.open_sftp()

# Ensure /wiki exists
try:
    sftp.stat('/wiki')
except FileNotFoundError:
    sftp.mkdir('/wiki')
    print('Ordner /wiki angelegt')

# Upload installer
sftp.put('wiki-installer/install-dokuwiki.php', '/wiki/install-dokuwiki.php')
print('install-dokuwiki.php hochgeladen nach /wiki/')

# Verify
stat = sftp.stat('/wiki/install-dokuwiki.php')
print(f'Verifiziert: {stat.st_size} bytes')

sftp.close()
client.close()
print('Fertig!')
"
