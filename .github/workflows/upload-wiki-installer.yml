name: Upload Wiki Installer to Strato

on:
  push:
    branches: [main]
    paths:
      - 'wiki-installer/**'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install-dokuwiki.php to /wiki/
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
        run: |
          pip install paramiko --quiet
          python3 wiki-installer/upload.py
