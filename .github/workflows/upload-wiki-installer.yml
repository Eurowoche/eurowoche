name: Upload Wiki Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wiki-installer/**"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install paramiko
        run: pip install paramiko --quiet

      - name: Upload to Strato
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
        run: python3 wiki-installer/upload.py
