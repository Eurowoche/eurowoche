baseURL = "https://aktuell.eurowoche.org/"
title = "Europäische Jugendwoche"
defaultContentLanguage = "de"
defaultContentLanguageInSubdir = false

[languages]
  [languages.de]
    languageName = "Deutsch"
    weight = 1
    contentDir = "content/de"
    [languages.de.params]
      description = "Europäische Jugendwoche auf Burg Ludwigstein – Ein besonderes Folklorefestival"
  [languages.en]
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    languagePrefix = "/en"
    [languages.en.params]
      description = "European Youth Week at Burg Ludwigstein – A unique folklore festival"
  [languages.fr]
    languageName = "Français"
    weight = 3
    contentDir = "content/fr"
    languagePrefix = "/fr"
    [languages.fr.params]
      description = "Semaine européenne de la jeunesse à Burg Ludwigstein – Un festival folklorique unique"

